name: Publish packages

on:
  push:
    branches: [main, preview]
    # paths: [packages/**, .changeset/*, __tests__/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# env:
#   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
#   TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
#   TURBO_CACHE: remote:rw

jobs:
  test:
    name: ⬣, 🔎, 🔨 Run tests
    uses: ./.github/workflows/build-test-reusable.yml
    if: "${{ !contains(github.event.head_commit.message, 'chore(packages): publish packages') }}"
    secrets: inherit

  publish:
    name: 🚀 Publish packages / Create PR for publishing packages
    needs: [test]
    runs-on: [ubuntu-latest]
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    strategy:
      matrix:
        node-version: [22.x]
    if: |
      ${{ (contains(github.event.head_commit.message, '[bump]') || contains(github.event.head_commit.message, 'chore(packages): publish packages')) && !cancelled() && (success() || failure() || needs.test.result == 'skipped') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Publish to npm
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          commit: "chore(packages): publish packages"
          title: "chore(packages): publish packages"
          publish: pnpm publish-packages
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.FDBOT_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
