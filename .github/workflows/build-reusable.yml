name: Reusable build workflow

on:
  workflow_call:
    inputs:
      skipInstallBuild:
        required: false
        description: "whether to skip pnpm install && pnpm build"
        type: string
      os:
        required: false
        description: "operating systems to run build on"
        type: string
      nodeVersion:
        required: false
        description: "version of Node.js to use"
        type: string
      pnpmVersion:
        required: false
        description: "version of pnpm to use"
        type: string
      afterBuild:
        required: false
        description: "additional steps to run"
        type: string

# env:
#   TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
#   TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
#   TURBO_CACHE: remote:rw

jobs:
  build:
    name: ⬣ Build on Node ${{ matrix.node-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.nodeVersion || '["22.x","24.x"]') }}
        os: ${{ fromJson(inputs.os || '["ubuntu-latest","windows-latest"]') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        if: ${{ inputs.skipInstallBuild != 'yes' }}

      - name: Build
        run: pnpm run build
        if: ${{ inputs.skipInstallBuild != 'yes' }}

      - name: Run after build
        shell: bash
        run: ${{ inputs.afterBuild }}
