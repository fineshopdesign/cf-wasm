packages:
  - packages/*
  - examples/*
  - __tests__
  - __tests__/*

allowBuilds:
  "@biomejs/biome": true
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  wasm-pack: true
  workerd: true

catalog:
  "@types/node": ^25.6.0
  "@types/react": ^19.2.14
  glob: ^13.0.6
  react: ^19.2.5
  tsdown: ^0.21.9
  vite: ^7.2.2
  vitest: ^4.1.4
  wasm-pack: ^0.14.0
  wrangler: ^4.83.0

engineStrict: true
strictPeerDependencies: true
shellEmulator: true
preferWorkspacePackages: true
linkWorkspacePackages: true
enablePrePostScripts: true
