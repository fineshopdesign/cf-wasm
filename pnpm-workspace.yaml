packages:
  - packages/*
  - examples/*
  - __tests__

engineStrict: true
strictPeerDependencies: true
shellEmulator: true
preferWorkspacePackages: true
linkWorkspacePackages: true
enablePrePostScripts: true

minimumReleaseAge: 1440

catalog:
  "@types/node": ^25.9.1
  "@types/react": ^19.2.15
  glob: ^13.0.6
  react: ^19.2.6
  tsdown: ^0.22.1
  vite: ^7.2.2
  vitest: ^4.1.7
  wasm-pack: ^0.15.0
  wrangler: ^4.95.0

allowBuilds:
  "@biomejs/biome": true
  "@parcel/watcher": true
  esbuild: true
  sharp: true
  wasm-pack: true
  workerd: true
